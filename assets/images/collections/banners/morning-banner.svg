<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1880 834" role="img" aria-labelledby="title desc">
  <title id="title">Morning Adhkār sunrise mountain lake banner</title>
  <desc id="desc">A calm sunrise over layered mountains and a reflective lake, with trees and wildflowers framing the foreground.</desc>
